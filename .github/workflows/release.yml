name: Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'Formula/**'
      - '*.md'

permissions:
  contents: write

jobs:
  release:
    # macos runner needed for codesign (preserves TCC/Accessibility
    # permissions across upgrades when signed with a stable identifier)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Test
        run: go test ./...

      - name: Determine version
        id: version
        run: |
          # Get latest tag or start at 0.1.0
          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          # Bump patch version
          MAJOR=$(echo $LATEST | cut -d. -f1 | tr -d v)
          MINOR=$(echo $LATEST | cut -d. -f2)
          PATCH=$(echo $LATEST | cut -d. -f3)
          PATCH=$((PATCH + 1))
          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          echo "Next version: v${VERSION}"

      - name: Build and sign binaries
        run: |
          VERSION=${{ steps.version.outputs.version }}
          mkdir -p dist

          # ad-hoc codesign with stable identifier so macOS TCC (Accessibility,
          # Full Disk Access, etc.) recognizes upgraded binaries as the same app
          # and preserves granted permissions across versions.

          GOOS=darwin GOARCH=arm64 go build -ldflags "-X github.com/tackish/pigeon-claw/cmd.version=${VERSION}" -o dist/pigeon-claw .
          codesign --force --sign - --identifier com.pigeon-claw dist/pigeon-claw
          tar -czf dist/pigeon-claw-darwin-arm64.tar.gz -C dist pigeon-claw
          rm dist/pigeon-claw

          GOOS=darwin GOARCH=amd64 go build -ldflags "-X github.com/tackish/pigeon-claw/cmd.version=${VERSION}" -o dist/pigeon-claw .
          codesign --force --sign - --identifier com.pigeon-claw dist/pigeon-claw
          tar -czf dist/pigeon-claw-darwin-amd64.tar.gz -C dist pigeon-claw
          rm dist/pigeon-claw

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ steps.version.outputs.tag }}
          # Delete existing tag/release if leftover from failed run
          git tag -d $TAG 2>/dev/null || true
          git push origin :refs/tags/$TAG 2>/dev/null || true
          gh release delete $TAG --yes 2>/dev/null || true
          # Create fresh
          git tag $TAG
          git push origin $TAG
          gh release create $TAG dist/*.tar.gz --title "$TAG" --generate-notes

      - name: Update Homebrew Formula
        run: |
          ARM_SHA=$(sha256sum dist/pigeon-claw-darwin-arm64.tar.gz | awk '{print $1}')
          AMD_SHA=$(sha256sum dist/pigeon-claw-darwin-amd64.tar.gz | awk '{print $1}')
          VERSION=${{ steps.version.outputs.version }}

          # BSD sed (macOS) requires empty string after -i
          sed -i '' "s/version \".*\"/version \"${VERSION}\"/" Formula/pigeon-claw.rb
          sed -i '' "/arm64/{n;s/.*sha256.*/      sha256 \"${ARM_SHA}\"/;}" Formula/pigeon-claw.rb
          sed -i '' "/amd64/{n;s/.*sha256.*/      sha256 \"${AMD_SHA}\"/;}" Formula/pigeon-claw.rb

          git config user.name "Tek"
          git config user.email "tackish@nate.com"
          git add Formula/pigeon-claw.rb
          git commit -m "brew: update formula to ${VERSION}" || true
          git push origin HEAD:main || true
